<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>EVE Wormhole Types — sde.whtype.info</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="main">
    <div class="search-wrap">
      <div class="search-display" id="searchDisplay">
        <div class="search-brand">sde.<strong>wh</strong>type.info</div>
        <div class="search-sep"></div>
        <div class="search-input-wrap">
          <div class="search-input-area">
            <span class="search-typed" id="searchTyped"></span><span class="blink-cursor">_</span><span class="search-hint" id="searchHint">(A009, C247...)</span>
          </div>
          <div class="results" id="results"></div>
          <input type="text" id="search" class="search-hidden" autofocus autocomplete="off" spellcheck="false" maxlength="4">
        </div>
      </div>
      <div class="stats-line" id="stats"></div>
    </div>
  </div>

  <!-- Modal overlay -->
  <div class="overlay" id="overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" title="Close">✕</button>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-attrs" id="modalAttrs"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div id="meta"></div>
    <div class="update-check">
      <button class="update-btn" id="checkBtn">Check for SDE update</button>
      <span class="update-status" id="checkStatus"></span>
    </div>
  </footer>

  <script>
    (function () {
      let wormholes = [];
      let meta = {};

      const searchInput   = document.getElementById('search');
      const searchTyped   = document.getElementById('searchTyped');
      const searchHint    = document.getElementById('searchHint');
      const searchDisplay = document.getElementById('searchDisplay');
      const resultsEl     = document.getElementById('results');
      const statsEl       = document.getElementById('stats');
      const overlay       = document.getElementById('overlay');
      const metaEl        = document.getElementById('meta');
      const modalName     = document.getElementById('modalName');
      const modalAttrs    = document.getElementById('modalAttrs');

      function render() {
        const q = searchInput.value.trim().toUpperCase();

        if (!q) {
          resultsEl.classList.remove('visible');
          resultsEl.innerHTML = '';
          statsEl.textContent = '';
          return;
        }

        const filtered = wormholes.filter(w => w.name.toUpperCase().includes(q));

        if (filtered.length === 0) {
          resultsEl.classList.add('visible');
          resultsEl.innerHTML = '<div class="no-results">No matching wormhole types</div>';
          statsEl.textContent = '';
          return;
        }

        statsEl.textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
        resultsEl.classList.add('visible');
        resultsEl.innerHTML = filtered.map(w => `
          <div class="result-item" data-name="${w.name}">
            <span class="result-name">${w.name}</span>
            <span class="result-typeid">${w.typeID != null ? w.typeID : '—'}</span>
          </div>
        `).join('');

        resultsEl.querySelectorAll('.result-item').forEach(el => {
          el.addEventListener('click', () => {
            const wh = wormholes.find(w => w.name === el.dataset.name);
            if (wh) openModal(wh);
          });
        });
      }

      function openModal(wh) {
        modalName.textContent = wh.name;

        const rows = [
          ['',     'typeID',             wh.typeID],
          ['1381', 'targetSystemClass',  wh.targetSystemClass],
          ['1382', 'maxStableTime',      wh.maxStableTime],
          ['1383', 'maxStableMass',      wh.maxStableMass],
          ['1384', 'massRegeneration',   wh.massRegeneration],
          ['1385', 'maxJumpMass',        wh.maxJumpMass],
          ['1457', 'targetDistribution', wh.targetDistribution],
        ];

        modalAttrs.innerHTML = rows.map(([id, k, v]) => `
          <span class="attr-id">${id}</span>
          <span class="attr-key">${k}</span>
          <span class="attr-val">${v != null ? v : '—'}</span>
        `).join('');

        overlay.classList.add('open');
      }

      function closeModal() {
        overlay.classList.remove('open');
        setTimeout(() => searchInput.focus(), 50);
      }

      document.getElementById('modalClose').addEventListener('click', closeModal);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if (e.key === 'Enter' && !overlay.classList.contains('open')) {
          const items = resultsEl.querySelectorAll('.result-item');
          if (items.length === 1) {
            const wh = wormholes.find(w => w.name === items[0].dataset.name);
            if (wh) openModal(wh);
          }
        }
      });

      // Clicking anywhere in the search display (including brand) focuses the input
      searchDisplay.addEventListener('click', () => searchInput.focus());

      // Keep search always focused when modal is not open
      searchInput.addEventListener('blur', () => {
        setTimeout(() => {
          if (!overlay.classList.contains('open')) {
            searchInput.focus();
          }
        }, 150);
      });

      searchInput.addEventListener('input', () => {
        searchTyped.textContent = searchInput.value;
        searchHint.style.display = searchInput.value ? 'none' : '';
        render();
      });

      // Load data
      fetch('data/wormholes.json')
        .then(r => r.json())
        .then(data => {
          meta = data.meta;
          wormholes = data.wormholes;

          const date = new Date(meta.generatedAt).toLocaleDateString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric'
          });
          metaEl.innerHTML = `SDE Build ${meta.sdeBuild} · ${date} · ${meta.count} types · <a href="https://developers.eveonline.com/docs/services/static-data/" target="_blank" rel="noopener">CCP Static Data Export</a>`;

          const checkBtn    = document.getElementById('checkBtn');
          const checkStatus = document.getElementById('checkStatus');

          checkBtn.addEventListener('click', async () => {
            checkBtn.disabled = true;
            checkStatus.innerHTML = '<span class="spinner"></span> Checking...';
            try {
              const res = await fetch('https://developers.eveonline.com/static-data/tranquility/latest.jsonl');
              const latest = JSON.parse(await res.text());
              if (latest.buildNumber > meta.sdeBuild) {
                checkStatus.textContent = `New build: ${latest.buildNumber} (current: ${meta.sdeBuild})`;
                checkStatus.style.color = '#e8d44d';
              } else {
                checkStatus.textContent = 'Up to date';
                checkStatus.style.color = '';
              }
            } catch {
              checkStatus.textContent = 'Check failed — try again later';
              checkStatus.style.color = '#f85149';
            }
            checkBtn.disabled = false;
          });
        })
        .catch(() => {
          statsEl.textContent = 'Failed to load wormhole data.';
        });
    })();
  </script>
</body>
</html>
