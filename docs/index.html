<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>EVE Wormhole Types — sde.whtype.info</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #1f6feb;
      --highlight: #ffc83d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    header { margin-bottom: 1.5rem; }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }

    .search-box:focus { border-color: var(--accent); }

    .search-box::placeholder { color: var(--text-dim); }

    .filter-select {
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      cursor: pointer;
    }

    .filter-select:focus { border-color: var(--accent); }

    .stats {
      color: var(--text-dim);
      font-size: 0.8rem;
      margin-bottom: 0.75rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      background: var(--surface);
      text-align: left;
      padding: 0.6rem 0.75rem;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    th:hover { color: var(--text); }
    th.sorted { color: var(--accent); }
    th .arrow { margin-left: 0.3em; font-size: 0.7rem; }

    td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(88, 166, 255, 0.04); }

    .wh-name {
      font-weight: 600;
      color: var(--accent);
    }

    .mass-value { font-variant-numeric: tabular-nums; }

    .no-results {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
    }

    footer {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 0.75rem;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .update-check {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .update-btn {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      font-size: 0.75rem;
      cursor: pointer;
    }

    .update-btn:hover { border-color: var(--accent); }
    .update-btn:disabled { opacity: 0.5; cursor: default; }

    .update-status {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .controls { flex-direction: column; }
      th, td { padding: 0.4rem 0.5rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>EVE Wormhole Types</h1>
    <div class="subtitle">Data from CCP's Static Data Export</div>
  </header>

  <div class="controls">
    <input type="text" id="search" class="search-box"
      placeholder="Search by name (e.g. C247, R943, A009)..." autofocus>
    <select id="classFilter" class="filter-select">
      <option value="">All targetSystemClass</option>
    </select>
  </div>

  <div id="stats" class="stats"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-key="name">Name <span class="arrow"></span></th>
          <th data-key="typeID">typeID <span class="arrow"></span></th>
          <th data-key="targetSystemClass">targetSystemClass <span class="arrow"></span></th>
          <th data-key="maxStableTime">maxStableTime <span class="arrow"></span></th>
          <th data-key="maxStableMass">maxStableMass <span class="arrow"></span></th>
          <th data-key="maxJumpMass">maxJumpMass <span class="arrow"></span></th>
          <th data-key="massRegeneration">massRegeneration <span class="arrow"></span></th>
          <th data-key="targetDistribution">targetDistribution <span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8" class="loading">Loading wormhole data...</td></tr>
      </tbody>
    </table>
  </div>

  <footer>
    <div id="meta"></div>
    <div class="update-check">
      <button class="update-btn" id="checkBtn">Check for SDE update</button>
      <span class="update-status" id="checkStatus"></span>
    </div>
  </footer>

  <script>
    (function () {
      let wormholes = [];
      let meta = {};
      let sortKey = 'name';
      let sortAsc = true;

      const tbody = document.getElementById('tbody');
      const searchInput = document.getElementById('search');
      const classFilter = document.getElementById('classFilter');
      const statsEl = document.getElementById('stats');
      const metaEl = document.getElementById('meta');

      function val(v) {
        return v != null ? v : '—';
      }

      function getFiltered() {
        const q = searchInput.value.trim().toUpperCase();
        const cls = classFilter.value;
        return wormholes.filter((w) => {
          if (q && !w.name.toUpperCase().includes(q)) return false;
          if (cls && String(w.targetSystemClass) !== cls) return false;
          return true;
        });
      }

      function getSorted(list) {
        return [...list].sort((a, b) => {
          let va = a[sortKey];
          let vb = b[sortKey];
          if (va == null) va = sortAsc ? Infinity : -Infinity;
          if (vb == null) vb = sortAsc ? Infinity : -Infinity;
          if (typeof va === 'string') {
            return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
          }
          return sortAsc ? va - vb : vb - va;
        });
      }

      function render() {
        const filtered = getSorted(getFiltered());
        statsEl.textContent = `Showing ${filtered.length} of ${wormholes.length} wormhole types`;

        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="no-results">No matching wormhole types found.</td></tr>';
          return;
        }

        tbody.innerHTML = filtered.map((w) => `
          <tr>
            <td class="wh-name">${w.name}</td>
            <td>${val(w.typeID)}</td>
            <td>${val(w.targetSystemClass)}</td>
            <td>${val(w.maxStableTime)}</td>
            <td>${val(w.maxStableMass)}</td>
            <td>${val(w.maxJumpMass)}</td>
            <td>${val(w.massRegeneration)}</td>
            <td>${val(w.targetDistribution)}</td>
          </tr>
        `).join('');

        // Update sort indicators
        document.querySelectorAll('th[data-key]').forEach((th) => {
          const arrow = th.querySelector('.arrow');
          if (th.dataset.key === sortKey) {
            th.classList.add('sorted');
            arrow.textContent = sortAsc ? '▲' : '▼';
          } else {
            th.classList.remove('sorted');
            arrow.textContent = '';
          }
        });
      }

      // Event listeners
      searchInput.addEventListener('input', render);
      classFilter.addEventListener('change', render);

      document.querySelectorAll('th[data-key]').forEach((th) => {
        th.addEventListener('click', () => {
          const key = th.dataset.key;
          if (sortKey === key) {
            sortAsc = !sortAsc;
          } else {
            sortKey = key;
            sortAsc = true;
          }
          render();
        });
      });

      // Load data
      fetch('data/wormholes.json')
        .then((r) => r.json())
        .then((data) => {
          meta = data.meta;
          wormholes = data.wormholes;

          // Populate class filter dropdown with raw values
          const classes = [...new Set(wormholes.map((w) => w.targetSystemClass).filter((v) => v != null))];
          classes.sort((a, b) => a - b);
          for (const cls of classes) {
            const opt = document.createElement('option');
            opt.value = String(cls);
            opt.textContent = cls;
            classFilter.appendChild(opt);
          }

          // Show metadata in footer
          const date = new Date(meta.generatedAt).toLocaleDateString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric'
          });
          metaEl.innerHTML = `SDE Build ${meta.sdeBuild} · Updated ${date} · ${meta.count} types · Source: <a href="https://developers.eveonline.com/docs/services/static-data/" target="_blank" rel="noopener">CCP Static Data Export</a>`;

          render();

          // Set up SDE update check button
          const checkBtn = document.getElementById('checkBtn');
          const checkStatus = document.getElementById('checkStatus');

          checkBtn.addEventListener('click', async () => {
            checkBtn.disabled = true;
            checkStatus.innerHTML = '<span class="spinner"></span> Checking...';

            try {
              const res = await fetch('https://developers.eveonline.com/static-data/tranquility/latest.jsonl');
              const latest = JSON.parse(await res.text());

              if (latest.buildNumber > meta.sdeBuild) {
                checkStatus.textContent = `New SDE build available: ${latest.buildNumber} (current: ${meta.sdeBuild})`;
                checkStatus.style.color = '#ffc83d';
              } else {
                checkStatus.textContent = 'Using latest SDE';
                checkStatus.style.color = '';
              }
            } catch {
              checkStatus.textContent = 'Failed to check — try again later';
              checkStatus.style.color = '#f85149';
            }

            checkBtn.disabled = false;
          });
        })
        .catch(() => {
          tbody.innerHTML = '<tr><td colspan="8" class="no-results">Failed to load wormhole data.</td></tr>';
        });
    })();
  </script>
</body>
</html>
